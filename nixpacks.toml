[variables]
NIXPACKS_PYTHON_VERSION = "3.11"
NIXPACKS_NODE_VERSION = "18"

[phases.setup]
nixPkgs = ['python311', 'nodejs_18', 'npm']

[phases.install]
cmds = [
    "pip install -r requirements.txt",
    "npm install --no-package-lock --production --no-optional"
]

[phases.build]
cmds = ["echo 'Build completed successfully'"]

[start]
cmd = "python launch_railway_final.py"